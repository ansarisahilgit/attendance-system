# ============================================================
# Student Attendance Management System - Application Config
# ============================================================

# --- Server ---
server.port=8080

# --- Database (MySQL) ---
# Replace 'your_password' with your actual MySQL root password
spring.datasource.url=jdbc:mysql://localhost:3306/attendance_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=mysql0028
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
# 'update' = Hibernate auto-creates/updates tables on startup
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Force all table/column names to lowercase (MySQL case-sensitive fix)
spring.jpa.properties.hibernate.globally_quoted_identifiers=false
spring.jpa.properties.hibernate.physical_naming_strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# --- Thymeleaf ---
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# --- Logging ---
logging.level.org.springframework.security=DEBUG
logging.level.com.attendance=DEBUG
